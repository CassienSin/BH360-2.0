name: CI

# Catch type errors, lint issues, and build breaks on every push —
# before Vercel does.
on:
  push:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Placeholder values so `next build` can prerender pages without a
      # real Supabase project — nothing contacts these at build time.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      # Advisory for now: the repo carries pre-existing lint findings
      # (mostly the strict react-hooks/set-state-in-effect rule). Surfacing
      # them without blocking the pipeline — flip to blocking once the
      # backlog is cleared.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
